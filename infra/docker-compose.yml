

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: reviewmind-postgres
    environment:
      POSTGRES_USER: reviewmind
      POSTGRES_PASSWORD: reviewmind_dev
      POSTGRES_DB: reviewmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reviewmind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: reviewmind-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://reviewmind:reviewmind_dev@postgres:5432/reviewmind
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../app:/code/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: reviewmind-frontend
    ports:
      - "5173:5173"
    volumes:
      - ../web:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: